- name: WCK Direct
  logo: wck.png
  headline: Building a scalable platform to support a food relief program
  link: /case-studies/wck-direct
  description: World Central Kitchen enlisted SmartLogic to transform its MVP into a scalable platform as they aimed to expand their text-to-order food relief program during the COVID-19 pandemic, including an iPad app for restaurants and a TailwindUI admin interface.

- name: Challenge
  logo: challenge-square.jpg
  headline: Expanding the functionality of Challenge.gov
  link: /case-studies/challenge
  description: SmartLogic <a href="/case-studies/kaptivate">partnered with Kaptivate to enhance Challenge.gov</a> with a secure, scalable platform that streamlines and centralizes the evaluation of public submissions.

- name: Clean Swell
  logo: clean-swell.png
  headline: Modernizing a global volunteer data collection tool for ocean conservation
  link: /case-studies/clean-swell
  description: SmartLogic partnered with Ocean Conservancy to maintain and expand the Clean Swell mobile app, a tool for tracking volunteer cleanup data and promoting community engagement in ocean conservation efforts.

- name: AEPSinteractive
